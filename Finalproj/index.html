<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motorcycle Shop - BlackRider</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🏍️ BlackRider Motorcycle Shop</h1>
        </header>

        <div class="main-content">
            <!-- Products Section -->
            <div class="products-section">
                <h2>Available Superbikes</h2>
                <div id="productList" class="product-grid"></div>
            </div>

            <!-- Cart Section -->
            <div class="cart-section">
                <h2>🛒 Shopping Cart</h2>
                <div id="cartItems" class="cart-items"></div>
                <div class="cart-summary">
                    <p>Items: <span id="count">0</span></p>
                    <p id="total">Total: ₱0</p>
                </div>
                <button id="clearCartBtn" class="clear-btn" onclick="clearCart()" style="display: none;">Clear Cart</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
